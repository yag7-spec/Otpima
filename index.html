<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doğum Günü Sürprizi!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #ff4757;
            --bg-gradient: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 5s ease-in-out;
            background: linear-gradient(135deg, #fceabb, #f8b500, #fceabb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Balon Animasyonu */
        .balloon {
            position: absolute;
            bottom: -100px;
            width: 40px;
            height: 50px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 10s infinite linear;
            z-index: 1;
        }

        @keyframes float {
            to { transform: translateY(-120vh) translateX(50px); }
        }

        /* Hediye Kutusu Ekranı */
        #gift-container {
            text-align: center;
            z-index: 10;
            cursor: pointer;
        }

        .gift-box {
            font-size: 100px;
            animation: shake 0.5s infinite;
            display: inline-block;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }

        .click-text {
            display: block;
            margin-top: 20px;
            font-size: 20px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.2);
        }

        /* Mesaj Ekranı */
        #message-container {
            display: none;
            text-align: center;
            z-index: 10;
            padding: 20px;
            animation: fadeIn 2s;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        p {
            font-size: 1.5rem;
            color: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Müzik ve Kontrol */
        #audio-control {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            z-index: 100;
            background: white;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Link Oluşturma Paneli */
        #creator-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .btn {
            background: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn:hover { background: #ff4757; color: #fff; }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 300px;
        }

        .modal input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="audio-control" onclick="toggleMusic()">🔊</div>
    <audio id="bg-music" loop>
        <source src="https://www.youtube.com/embed/jqYxyd1iSNk?autoplay=1&loop=1&playlist=jqYxyd1iSNk" type="audio/mpeg">
    </audio>

    <div id="balloons-container"></div>

    <div id="gift-container" onclick="openGift()">
        <div class="gift-box">🎁</div>
        <span class="click-text">Sürprizini Açmak İçin Tıkla!</span>
    </div>

    <div id="message-container">
        <h1 id="user-title">İyi ki Doğdun!</h1>
        <p id="user-message">Nice mutlu senelere...</p>
    </div>

    <div id="creator-panel">
        <button class="btn" onclick="toggleModal(true)">Kendi Linkini Oluştur</button>
    </div>

    <div id="modal" class="modal">
        <h3>Link Oluştur</h3>
        <input type="text" id="input-name" placeholder="İsim">
        <input type="text" id="input-msg" placeholder="Mesaj">
        <button class="btn" onclick="generateLink()">Link Oluştur</button>
        <button class="btn" onclick="toggleModal(false)" style="margin-top: 5px; background: #eee;">Kapat</button>
        <p id="output-link" style="font-size: 10px; word-break: break-all; color: #333; margin-top: 10px;"></p>
    </div>

    <script>
        // URL Parametrelerini Oku
        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('isim');
        const msgParam = urlParams.get('mesaj');

        if (nameParam) document.getElementById('user-title').innerText = `İyi ki Doğdun ${nameParam}!`;
        if (msgParam) document.getElementById('user-message').innerText = msgParam.replace(/_/g, ' ');

        // Kutu Açma Fonksiyonu
        function openGift() {
            document.getElementById('gift-container').style.display = 'none';
            document.getElementById('message-container').style.display = 'block';
            
            // Konfeti Patlat
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
            
            // Müziği Başlat
            playMusic();
        }

        // Müzik Kontrolü
        const music = document.getElementById('bg-music');
        function playMusic() {
            music.play();
            document.getElementById('audio-control').innerText = "🔊";
        }

        function toggleMusic() {
            if (music.paused) {
                music.play();
                document.getElementById('audio-control').innerText = "🔊";
            } else {
                music.pause();
                document.getElementById('audio-control').innerText = "🔇";
            }
        }

        // Balon Üretici
        function createBalloons() {
            const container = document.getElementById('balloons-container');
            for (let i = 0; i < 20; i++) {
                let b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = Math.random() * 100 + 'vw';
                b.style.animationDelay = Math.random() * 10 + 's';
                b.style.opacity = Math.random();
                b.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
                container.appendChild(b);
            }
        }
        createBalloons();

        // Modal Kontrolü
        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'block' : 'none';
        }

        function generateLink() {
            const name = document.getElementById('input-name').value;
            const msg = document.getElementById('input-msg').value.replace(/ /g, '_');
            const baseUrl = window.location.href.split('?')[0];
            const finalLink = `${baseUrl}?isim=${encodeURIComponent(name)}&mesaj=${encodeURIComponent(msg)}`;
            
            const output = document.getElementById('output-link');
            output.innerText = finalLink;
            
            // Otomatik Kopyala
            navigator.clipboard.writeText(finalLink);
            alert("Link oluşturuldu ve kopyalandı!");
        }
    </script>
</body>
</html>
